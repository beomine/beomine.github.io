<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="visor" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a8e6ff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4dc9f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="visorShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="198"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <g clip-path="url(#circle)">
    <!-- Stars -->
    <circle cx="60" cy="50" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="120" cy="90" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="310" cy="60" r="1.8" fill="#fff" opacity="0.8"/>
    <circle cx="340" cy="130" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="50" cy="170" r="1.2" fill="#fff" opacity="0.6"/>
    <circle cx="355" cy="220" r="1.5" fill="#fff" opacity="0.5"/>
    <circle cx="80" cy="300" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="330" cy="310" r="1.3" fill="#fff" opacity="0.6"/>
    <circle cx="45" cy="250" r="0.8" fill="#fff" opacity="0.5"/>
    <circle cx="360" cy="170" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="150" cy="40" r="1.2" fill="#fff" opacity="0.5"/>
    <circle cx="260" cy="55" r="0.8" fill="#fff" opacity="0.6"/>
    <circle cx="90" cy="350" r="1.5" fill="#fff" opacity="0.4"/>
    <circle cx="300" cy="360" r="1" fill="#fff" opacity="0.5"/>

    <!-- Twinkling stars -->
    <circle cx="280" cy="80" r="2" fill="#fff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="120" r="1.5" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="280" r="1.8" fill="#fff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Suit body -->
    <path d="M120,395 Q120,310 145,285 Q170,260 200,255 Q230,260 255,285 Q280,310 280,395 Z" fill="#e8e8ec"/>
    <path d="M120,395 Q120,310 145,285 Q170,260 200,255 Q230,260 255,285 Q280,310 280,395" fill="none" stroke="#d0d0d8" stroke-width="2"/>

    <!-- Suit chest panel -->
    <rect x="175" y="290" width="50" height="55" rx="8" fill="#c8c8d4" opacity="0.5"/>
    <circle cx="192" cy="308" r="4" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="208" cy="308" r="4" fill="#4dc9f6" opacity="0.8"/>
    <rect x="185" y="322" width="30" height="3" rx="1.5" fill="#a0a0b0" opacity="0.5"/>
    <rect x="189" y="330" width="22" height="3" rx="1.5" fill="#a0a0b0" opacity="0.4"/>

    <!-- Helmet outer -->
    <ellipse cx="200" cy="175" rx="90" ry="95" fill="#e8e8ec"/>
    <ellipse cx="200" cy="175" rx="90" ry="95" fill="none" stroke="#d0d0d8" stroke-width="2.5"/>

    <!-- Helmet rim -->
    <ellipse cx="200" cy="175" rx="82" ry="87" fill="none" stroke="#b8b8c4" stroke-width="3"/>

    <!-- Visor -->
    <ellipse cx="200" cy="170" rx="68" ry="70" fill="url(#visor)"/>
    <ellipse cx="200" cy="170" rx="68" ry="70" fill="url(#visorShine)"/>
    <ellipse cx="200" cy="170" rx="68" ry="70" fill="none" stroke="#6ab8d6" stroke-width="2.5"/>

    <!-- Visor reflection streak -->
    <path d="M155,135 Q170,128 185,132" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M155,145 Q163,141 168,143" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

    <!-- Antenna -->
    <line x1="200" y1="80" x2="200" y2="55" stroke="#b8b8c4" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="50" r="6" fill="#ff6b6b" opacity="0.9" filter="url(#glow)">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Ear pieces -->
    <ellipse cx="112" cy="185" rx="12" ry="18" fill="#d0d0d8"/>
    <ellipse cx="112" cy="185" rx="12" ry="18" fill="none" stroke="#b8b8c4" stroke-width="1.5"/>
    <ellipse cx="288" cy="185" rx="12" ry="18" fill="#d0d0d8"/>
    <ellipse cx="288" cy="185" rx="12" ry="18" fill="none" stroke="#b8b8c4" stroke-width="1.5"/>
  </g>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="198" fill="none" stroke="#4dc9f6" stroke-width="2" opacity="0.3"/>
</svg>
